name: CI

# Runs on every push and pull request.
# Uses the Kiwix Ray Charles mini ZIM (~694 KB) to validate the full
# pipeline end-to-end without downloading the 22 GB production ZIM.
# ZIM resolution, config generation, and pipeline execution are all
# handled by `make mini` — see Makefile for details.

on:
  push:
    branches: ['**']
    tags-ignore: ['corpus-v*']   # corpus builds handled by build-corpus.yml
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install -e ".[dev]"

      - name: pytest
        run: python -m pytest tests/ -v --tb=short

  integration:
    name: Integration (mini ZIM)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install -e ".[dev]" ; sudo apt-get install -y --no-install-recommends zstd

      - name: Run mini pipeline
        run: make mini PYTHON=python3

      - name: Verify BUILD_HASH exists
        run: test -f data/build-mini/BUILD_HASH && cat data/build-mini/BUILD_HASH

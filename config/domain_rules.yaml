# ---------------------------------------------------------------------------
# Domain Classification Rules
# ---------------------------------------------------------------------------
# Each domain lists "anchor" substrings checked against an article's
# lowercase category names.  A category matches a domain if ANY of its
# anchor patterns appear as a substring of the category text.
#
# Assignment algorithm (Stage 2):
#   1. For each article, count how many category strings match each domain.
#   2. Assign the domain with the highest match count.
#   3. Tiebreak: alphabetical domain name (deterministic).
#
# Tuning notes:
#   - More specific anchors reduce false positives.
#   - Short common substrings (e.g. "art") cause cross-domain noise — avoid.
#   - All matching is case-insensitive (categories are lowercased before check).
# ---------------------------------------------------------------------------

